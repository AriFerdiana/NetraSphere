<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - SmartWaste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } } }</script>
</head>
<body class="font-sans bg-gray-50 flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- Decorative background -->
    <div class="absolute top-0 left-0 w-full h-1/2 bg-emerald-600 z-0"></div>

    <div class="relative z-10 w-full max-w-md px-4">
        <!-- Logo -->
        <div class="text-center mb-8 text-white">
            <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/30 shadow-inner">
                <span class="text-3xl">🔑</span>
            </div>
            <h1 class="text-3xl font-black tracking-tight">Lupa Password</h1>
            <p class="text-emerald-100 text-sm mt-2">Kami akan mengirimkan instruksi reset ke email Anda.</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form th:action="@{/auth/forgot-password}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">Alamat Email Terdaftar</label>
                    <input type="email" name="email" required
                           class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 focus:bg-white transition-all shadow-sm"
                           placeholder="nama@email.com">
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-500/30">
                    Kirim Link Reset
                </button>
            </form>

            <div class="mt-8 text-center text-sm font-semibold">
                <a th:href="@{/auth/login}" class="text-emerald-600 hover:text-emerald-700 transition-colors">← Kembali ke Halaman Login</a>
            </div>
        </div>
    </div>
</body>
</html>
