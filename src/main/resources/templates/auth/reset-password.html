<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SmartWaste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } } }</script>
</head>
<body class="font-sans bg-gray-50 flex items-center justify-center min-h-screen relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1/2 bg-emerald-600 z-0"></div>

    <div class="relative z-10 w-full max-w-md px-4">
        <div class="text-center mb-8 text-white">
            <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/30 shadow-inner">
                <span class="text-3xl">🔐</span>
            </div>
            <h1 class="text-3xl font-black tracking-tight">Buat Password Baru</h1>
            <p class="text-emerald-100 text-sm mt-2">Pastikan password baru Anda kuat dan mudah diingat.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form th:action="@{/auth/reset-password}" method="POST" class="space-y-5" onsubmit="return document.getElementById('pw1').value === document.getElementById('pw2').value;">
                <input type="hidden" name="token" th:value="${token}">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">Password Baru</label>
                    <input type="password" id="pw1" name="newPassword" required minlength="6"
                           class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 focus:bg-white transition-all shadow-sm">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">Ulangi Password Baru</label>
                    <input type="password" id="pw2" required minlength="6"
                           class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 focus:bg-white transition-all shadow-sm">
                    <p class="text-xs text-red-500 mt-1 hidden" id="pwError">Password tidak cocok!</p>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-500/30">
                    Simpan Password Baru
                </button>
            </form>

            <script>
                document.getElementById('pw2').addEventListener('input', function() {
                    const pw1 = document.getElementById('pw1').value;
                    const pw2 = this.value;
                    const error = document.getElementById('pwError');
                    if(pw1 !== pw2) {
                        error.classList.remove('hidden');
                    } else {
                        error.classList.add('hidden');
                    }
                });
            </script>
        </div>
    </div>
</body>
</html>
